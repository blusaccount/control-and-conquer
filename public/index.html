<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control & Conquer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
      }

      body {
        margin: 0;
        background: #0f1117;
        color: #f3f4f6;
      }

      main {
        display: grid;
        grid-template-columns: 320px 1fr;
        min-height: 100vh;
      }

      aside {
        background: #161a22;
        border-right: 1px solid #2a3341;
        padding: 16px;
      }

      h1,
      h2,
      p {
        margin: 0 0 8px;
      }

      section {
        margin-bottom: 16px;
      }

      label,
      input,
      button {
        display: block;
        width: 100%;
      }

      input,
      button {
        margin-top: 6px;
      }

      input {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #374151;
        background: #0f172a;
        color: #f3f4f6;
      }

      button {
        padding: 10px;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        cursor: pointer;
      }

      .layout {
        padding: 16px;
      }

      #mapCanvas {
        width: 100%;
        max-width: 760px;
        background: #0b1220;
        border: 1px solid #293447;
        border-radius: 12px;
        display: block;
      }

      .hint {
        color: #9ca3af;
        font-size: 13px;
      }

      .status {
        min-height: 22px;
        font-size: 14px;
      }

      .status.error {
        color: #fca5a5;
      }

      ul {
        margin: 8px 0 0;
        padding-left: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <section>
          <h1>Control &amp; Conquer</h1>
          <p class="hint">OpenFront-inspired territory combat MVP.</p>
        </section>

        <section>
          <h2>Your Team</h2>
          <div id="teamInfo">Connecting...</div>
        </section>

        <section>
          <h2>Attack</h2>
          <p class="hint">Click your territory, then click an adjacent enemy territory.</p>
          <label>
            Troops to send
            <input id="attackTroopsInput" type="number" min="1" value="1" />
          </label>
          <button id="clearSelectionButton" type="button">Clear selection</button>
          <div id="selectionInfo" class="hint">No source territory selected.</div>
          <div id="statusMessage" class="status" aria-live="polite"></div>
        </section>

        <section>
          <h2>Recent Events</h2>
          <div id="events"></div>
        </section>
      </aside>

      <div class="layout">
        <canvas id="mapCanvas" width="760" height="460"></canvas>
      </div>
    </main>
    <script type="module" src="/assets/Client/main.js"></script>
  </body>
</html>
